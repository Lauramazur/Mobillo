<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="utf-8">
    <title>Mobillo</title>
     <link rel="stylesheet" href="style.css">

     <!-- FONTURI NOI -->
     <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Raleway:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <header>
      <div class="navbar">
<div class="logo">Mobillo</div>
<div class="search-box">
    <input type="text" placeholder="Caută produse..." />
    <button>
      🔍︎  
    </button>
</div>
<div class="menu">
        <div class="catalog-btn">☰ Catalog</div>
        <div class="icon">
            ⁠♡ 
            <span class="badge">0</span>
        </div>
        <div class="icon">
            🛒
            <span class="badge">0</span>
        </div>
    </div>
</div>
    </header>
    <div class="filter-bar">
  <button data-filter="dormitor">Dormitor</button>
  <button data-filter="canapea">Canapele</button>
  <button data-filter="bucatarie">Bucătării</button>
  <button data-filter="living">Livinguri</button>
   <button data-filter="antreuri">Antreuri</button>
   <button data-filter="pat">Paturi</button>
   <button data-filter="saltea">Saltele</button>
   <button data-filter="comod">Comode TV</button>
   <button data-filter="pentru copii">Pentru copii</button>
</div>

<section class="hero">
  <div class="hero-text">
    <h1>
      <span class="line1">Găsește mobila perfectă</span>
      <span class="line2 accent">Mobillo</span>
    </h1>
  </div>

  <div class="hero-images">
    <img src="https://icam.md/storage/products/1013/66291e49854f9_1(5).jpg" class="img main">
    <img src="https://icam.md/storage/products/1007/66291408a1b8e_1(4).jpg" class="img small top">
    <img src="https://icam.md/storage/products/1781/685904afac31f_WhatsApp-Image-2025-06-23-at-09.16.11.jpg" class="img small bottom">
  </div>
</section>

 <div class="footer">
  <p>
    Realizat de 
    <span>Mazur Laura</span> & 
    <span>Șeremet Sorina</span> & 
    <span>Paladi Diana</span> — 
    <strong>DAW - 241</strong>
  </p>
</div>

</html>
